# Server
server.port=8080

# H2 Database (dev mode - switch to MySQL/PostgreSQL for production)
spring.datasource.url=jdbc:h2:mem:learningportaldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=gvcc-learning-portal-super-secret-key-2024-change-in-production
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.learningportal=INFO
logging.level.org.springframework.security=WARN
